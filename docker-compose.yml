version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist database data
      - secondhand-data:/app/database
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/database/secondhand.db
    restart: unless-stopped

volumes:
  secondhand-data:
