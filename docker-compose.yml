version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist database data
      - secondhand-data:/app/database
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:/app/database/secondhand.db
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  secondhand-data:
  redis-data: