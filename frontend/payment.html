<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Checkout</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  </head>
  <body>
    <header class="top-nav">
      <a href="index.html" class="brand">
        <div class="brand-icon">SH</div>
        <div class="brand-text">
          <h1>Secure Checkout</h1>
          <span>Complete your purchase</span>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Shopping
        </a>
      </nav>
    </header>

    <div class="payment-grid">
      <div class="payment-form">
        <h2>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
          Payment Details
        </h2>
        
        <div class="card-preview">
          <div style="font-size: 12px; opacity: 0.7;">Card Number</div>
          <div class="card-preview-number" id="previewNumber">**** **** **** ****</div>
          <div class="card-preview-row">
            <div>
              <div style="margin-bottom: 4px;">Card Holder</div>
              <div id="previewName" style="font-size: 14px; opacity: 1;">YOUR NAME</div>
            </div>
            <div style="text-align: right;">
              <div style="margin-bottom: 4px;">Expires</div>
              <div id="previewExpiry" style="font-size: 14px; opacity: 1;">MM/YY</div>
            </div>
          </div>
        </div>

        <p class="notice" id="paymentNotice" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span></span>
        </p>

        <div class="form-group">
          <label for="cardName">Name on card</label>
          <input id="cardName" type="text" placeholder="Jordan Lee" autocomplete="cc-name" />
        </div>
        <div class="form-group">
          <label for="cardNumber">Card number</label>
          <input id="cardNumber" type="text" placeholder="4111 1111 1111 1111" maxlength="19" autocomplete="cc-number" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="cardExpiry">Expiry date</label>
            <input id="cardExpiry" type="text" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp" />
          </div>
          <div class="form-group">
            <label for="cardCvv">CVV</label>
            <input id="cardCvv" type="password" placeholder="123" maxlength="4" autocomplete="cc-csc" />
          </div>
        </div>
        
        <h3 style="margin: 24px 0 16px; font-size: 16px;">Billing Address</h3>
        
        <div class="form-group">
          <label for="billingAddress">Street address</label>
          <input id="billingAddress" type="text" placeholder="123 King St W" autocomplete="street-address" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="billingCity">City</label>
            <input id="billingCity" type="text" placeholder="Waterloo" autocomplete="address-level2" />
          </div>
          <div class="form-group">
            <label for="billingPostal">Postal code</label>
            <input id="billingPostal" type="text" placeholder="N2L 3G1" autocomplete="postal-code" />
          </div>
        </div>

        <button class="btn btn-primary" id="payBtn" style="width: 100%; margin-top: 16px; padding: 16px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          Place Secure Order
        </button>
        
        <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 16px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Your payment information is secure and encrypted
        </p>
      </div>

      <div class="order-summary">
        <h3>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 8px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          Order Summary
        </h3>
        <div class="order-items" id="orderItems">
          <p style="color: var(--text-muted); font-size: 14px;">Loading cart...</p>
        </div>
        <div class="order-total">
          <span>Total</span>
          <span id="orderTotal">$0.00</span>
        </div>
      </div>
    </div>

    <script src="js/payment.js"></script>
  </body>
</html>
