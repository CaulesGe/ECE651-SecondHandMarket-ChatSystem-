<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Login</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  </head>
  <body>
    <header class="top-nav">
      <a href="index.html" class="brand">
        <div class="brand-icon">SH</div>
        <div class="brand-text">
          <h1>Secondhand Hub</h1>
          <span>Sign in to continue</span>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
      </nav>
    </header>

    <section class="form-container">
      <h2>Welcome back</h2>
      <p>Sign in to access your account and start shopping.</p>
      <p class="notice notice-error" id="loginNotice" style="display: none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        <span></span>
      </p>
      <div class="form-group">
        <label for="loginEmail">Email address</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width: 100%; margin-top: 8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
        Sign in
      </button>
      <p class="form-footer">
        New here? <a href="register.html">Create an account</a>
      </p>
    </section>

    <script src="js/auth.js"></script>
  </body>
</html>
