<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Login</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">
        <h1>Secondhand Hub</h1>
        <span>Sign in to continue</span>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
      </nav>
    </header>

    <section class="form-container">
      <h2>Welcome back</h2>
      <p class="notice" id="loginNotice" style="display: none;"></p>
      <div class="form-group">
        <label>Email</label>
        <input id="loginEmail" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="********" />
      </div>
      <button class="btn btn-primary" id="loginBtn">Login</button>
      <p style="margin-top: 14px; font-size: 13px; color: #5c6a88;">
        New here? <a href="register.html">Create an account</a>.
      </p>
    </section>

    <script src="js/auth.js"></script>
  </body>
</html>
