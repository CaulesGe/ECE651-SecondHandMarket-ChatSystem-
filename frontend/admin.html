<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  </head>
  <body>
    <header class="top-nav">
      <a href="index.html" class="brand">
        <div class="brand-icon">SH</div>
        <div class="brand-text">
          <h1>Admin Dashboard</h1>
          <span>Manage your marketplace</span>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <button id="logoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </button>
      </nav>
    </header>

    <section class="admin-grid">
      <p class="notice notice-error" id="adminNotice">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        Admin access required. Please login as an admin user.
      </p>

      <div class="admin-stats" id="adminStats" style="display: none;">
        <div class="stat-card">
          <span class="stat-value" id="userCount">0</span>
          <span class="stat-label">Total Users</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="goodsCount">0</span>
          <span class="stat-label">Active Listings</span>
        </div>
        <div class="stat-card">
          <span class="stat-value" id="transactionCount">0</span>
          <span class="stat-label">Transactions</span>
        </div>
      </div>

      <div class="admin-card" id="usersCard" style="display: none;">
        <div class="admin-card-header">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 8px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
            Registered Users
          </h3>
        </div>
        <div class="admin-card-body">
          <table class="table" id="usersTable"></table>
        </div>
      </div>

      <div class="admin-card" id="goodsCard" style="display: none;">
        <div class="admin-card-header">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 8px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            All Listings
          </h3>
        </div>
        <div class="admin-card-body">
          <table class="table" id="goodsTable"></table>
        </div>
      </div>

      <div class="admin-card" id="transactionsCard" style="display: none;">
        <div class="admin-card-header">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 8px;"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
            Transaction History
          </h3>
        </div>
        <div class="admin-card-body">
          <table class="table" id="transactionsTable"></table>
        </div>
      </div>
    </section>

    <script src="js/admin.js"></script>
  </body>
</html>
