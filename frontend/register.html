<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Register</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">
        <h1>Secondhand Hub</h1>
        <span>Create your account</span>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <section class="form-container">
      <h2>Join the marketplace</h2>
      <p class="notice" id="registerNotice" style="display: none;"></p>
      <div class="form-group">
        <label>Full name</label>
        <input id="registerName" type="text" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="registerEmail" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="registerPassword" type="password" placeholder="********" />
      </div>
      <button class="btn btn-primary" id="registerBtn">Create account</button>
      <p style="margin-top: 14px; font-size: 13px; color: #5c6a88;">
        Already have an account? <a href="login.html">Login</a>.
      </p>
    </section>

    <script src="js/auth.js"></script>
  </body>
</html>
