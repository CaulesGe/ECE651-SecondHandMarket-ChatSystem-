<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secondhand Hub | Register</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  </head>
  <body>
    <header class="top-nav">
      <a href="index.html" class="brand">
        <div class="brand-icon">SH</div>
        <div class="brand-text">
          <h1>Secondhand Hub</h1>
          <span>Create your account</span>
        </div>
      </a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <section class="form-container">
      <h2>Join the marketplace</h2>
      <p>Create an account to buy, sell, and connect with your community.</p>
      <p class="notice notice-error" id="registerNotice" style="display: none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        <span></span>
      </p>
      <div class="form-group">
        <label for="registerName">Full name</label>
        <input id="registerName" type="text" placeholder="Jordan Lee" autocomplete="name" />
      </div>
      <div class="form-group">
        <label for="registerEmail">Email address</label>
        <input id="registerEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input id="registerPassword" type="password" placeholder="Create a password" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary" id="registerBtn" style="width: 100%; margin-top: 8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
        Create account
      </button>
      <p class="form-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </section>

    <script src="js/auth.js"></script>
  </body>
</html>
